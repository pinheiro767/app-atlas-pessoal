<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Anatomia Topográfica PWA</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050816">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <aside class="sidebar">

        <h1 class="logo">ANATOMIA</h1>

        <button onclick="abrirAba('galeria')">
            📚 Imagens
        </button>

        <button onclick="abrirAba('slides')">
            🎞️ Slides
        </button>

        <button onclick="abrirAba('camera')">
            📸 Câmera
        </button>

        <button onclick="abrirAba('mapa')">
            🧠 Mapa Mental
        </button>

        <button onclick="abrirAba('audio')">
            🔊 Áudios
        </button>

        <button onclick="abrirAba('upload')">
            ⬆ Receber Imagens
        </button>

    </aside>


    <main class="conteudo">

        <header class="topbar">
            <h2>Anatomia Topográfica de MMSS</h2>
        </header>


        <section id="galeria" class="aba ativa">

            <div class="titulo-area">
                <h2>Galeria Anatômica</h2>
            </div>

            <div id="grade-imagens" class="grade-imagens"></div>

        </section>


        <section id="slides" class="aba">

            <div class="titulo-area">
                <h2>Passador de Slides Anatômicos</h2>
            </div>

            <div class="slide-player">

                <button onclick="slideAnterior()">
                    ⬅ Anterior
                </button>

                <div class="slide-box">
                    <img
                        id="slide-img"
                        src="/assets/img/1.png"
                        alt="Slide anatômico"
                    >

                    <h3 id="slide-titulo">
                        Imagem 1 / 120
                    </h3>
                </div>

                <button onclick="proximoSlide()">
                    Próximo ➡
                </button>

            </div>

            <div class="slide-acoes">

                <button onclick="abrirSlide(slideAtual)">
                    🔍 Tela cheia
                </button>

                <button onclick="gerarMapaDaImagem(slideAtual)">
                    🧠 Gerar mapa mental
                </button>

                <button onclick="lerImagem(slideAtual)">
                    🔊 Áudio
                </button>

            </div>

        </section>


        <section id="camera" class="aba">

            <div class="titulo-area">
                <h2>Câmera Anatômica</h2>
            </div>

            <video
                id="video"
                autoplay
                playsinline
            ></video>

            <canvas id="canvas"></canvas>

            <div class="botoes-camera">

                <button onclick="abrirCamera()">
                    Abrir câmera
                </button>

                <button onclick="tirarFoto()">
                    Tirar Foto
                </button>

            </div>

            <div
                id="fotos-salvas"
                class="fotos-salvas"
            ></div>

        </section>


        <section id="mapa" class="aba">

            <div class="titulo-area">
                <h2>Mapa Mental Anatômico</h2>
            </div>

            <div class="form-mapa">

                <input
                    type="text"
                    id="origem-mapa"
                    placeholder="Ex: Plexo Braquial"
                >

                <input
                    type="text"
                    id="destino-mapa"
                    placeholder="Ex: Artéria Axilar"
                >

                <button onclick="adicionarConexaoMapa()">
                    Adicionar conexão
                </button>

            </div>

            <svg
                id="mapa-svg"
                class="mapa-svg"
            ></svg>

            <div
                id="mapa-mental"
                class="mapa-mental"
            ></div>

        </section>


        <section id="audio" class="aba">

            <div class="titulo-area">
                <h2>Áudios Anatômicos</h2>
            </div>

            <div class="audio-grid">

                <button onclick="tocarAudio('plexo_braquial')">
                    Plexo Braquial
                </button>

                <button onclick="tocarAudio('linfonodos_axilares')">
                    Linfonodos Axilares
                </button>

                <button onclick="tocarAudio('mao_compartimentos')">
                    Compartimentos da Mão
                </button>

            </div>

            <audio
                id="player"
                controls
            ></audio>

            <div class="leitor-texto">

                <h3>Leitor Anatômico Inteligente</h3>

                <textarea
                    id="texto-audio"
                    placeholder="Cole aqui textos grandes sobre nervos, músculos, linfonodos, plexo braquial, regiões anatômicas..."
                ></textarea>

                <button onclick="gerarAudioTexto()">
                    🔊 Ler Texto Completo
                </button>

                <div id="lista-audios-texto"></div>

            </div>

        </section>


        <section id="upload" class="aba">

            <div class="titulo-area">
                <h2>Receber Imagens</h2>
            </div>

            <input
                type="file"
                id="input-imagens"
                multiple
                accept="image/*"
            >

            <button onclick="enviarImagens()">
                Enviar Imagens
            </button>

            <div id="resultado-upload"></div>

        </section>

    </main>

    <script src="app.js"></script>

</body>
</html>
